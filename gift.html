<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Midnight Cravings</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  font-family:Arial,sans-serif;
}


/* =========================
   BANNER
========================= */

.midnightBanner{
  position:relative;

  width:100%;
  height:170px;

  overflow:hidden;

  background:linear-gradient(
    180deg,
    #17113f 0%,
    #28175a 45%,
    #4c2878 100%
  );

  contain:layout paint;
}


/* =========================
   LEFT IMAGE
========================= */

.midnightLeftBox{
  position:absolute;

  left:-32px;
  top:-28px;

  width:130px;
  height:130px;

  z-index:2;
}


.midnightLeftImg{
  width:100%;
  height:100%;

  object-fit:contain;

  display:block;
}


/* =========================
   RIGHT IMAGE
========================= */

.midnightRightBox{
  position:absolute;

  right:-32px;
  top:-28px;

  width:130px;
  height:130px;

  z-index:2;
}


.midnightRightImg{
  width:100%;
  height:100%;

  object-fit:contain;

  display:block;
}


/* =========================
   CENTER TEXT
========================= */

.midnightText{
  position:absolute;

  left:50%;
  top:54%;

  transform:translate(-50%,-50%);

  width:100%;

  text-align:center;

  z-index:5;
}


.midnightText h2{
  margin:0;

  font-size:28px;
  font-weight:900;

  line-height:1;

  letter-spacing:-1px;

  color:#ffd84d;

  white-space:nowrap;
}


/* =========================
   MOBILE
========================= */

@media(max-width:480px){

  .midnightBanner{
    height:150px;
  }


  .midnightLeftBox{
    width:105px;
    height:105px;

    left:-30px;
    top:-20px;
  }


  .midnightRightBox{
    width:105px;
    height:105px;

    right:-30px;
    top:-20px;
  }


  .midnightText h2{
    font-size:21px;
    letter-spacing:-.7px;
  }

}

</style>
</head>


<body>


<section class="midnightBanner">


  <!-- LEFT TOP IMAGE -->

  <div class="midnightLeftBox">

    <img
      class="midnightLeftImg"
      src="midnight/left.png"
      alt=""
      loading="lazy"
      decoding="async"
    >

  </div>



  <!-- CENTER TEXT -->

  <div class="midnightText">

    <h2>
      MIDNIGHT CRAVINGS
    </h2>

  </div>



  <!-- RIGHT TOP IMAGE -->

  <div class="midnightRightBox">

    <img
      class="midnightRightImg"
      src="midnight/right.png"
      alt=""
      loading="lazy"
      decoding="async"
    >

  </div>


</section>


</body>
</html>
